<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <link rel="icon" href="data:,">
  <title>newsless.cc</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: serif;
      line-height: 1.4;
      font-size: 18px;
      padding: 0 10px 10px;
    }
    h1 { margin-bottom: -15px; }
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-size: 15px;
      margin: 2em 0 0;
    }
    a { color: inherit; text-decoration: none}
    a:hover { background-color: #000; color: #fff }
    #section-title h2 {
      margin: 1em 0 0;
    }
    select {
      font: inherit;
      font-size: 13px;
      margin: 1em 0;
      display: block;
      background: transparent;
      border: 1px solid;
      color: inherit;
      padding: 2px 4px;
    }
    ol {
      padding-left: 1.2em;
    }
    ol li {
      margin-bottom: 8px;
    }
    ol li p {
      margin: 2px 0 0;
      font-size: 90%;
      color: inherit;
      opacity: 0.7;
    }
    #nav-links {
      list-style: none;
      padding: 0;
      margin: 8px 0 0;
    }
    #nav-links a {
      text-decoration: underline;
    }
    #nav-links li {
      display: inline-block;
      margin-right: 8px;
    }
    footer small {
      display: block;
      opacity: 0.7;
    }
    @media (prefers-color-scheme: dark) {
      a:hover { background-color: #fff; color: #000; }
    }
  </style>
</head>
<body>

<main>
  <h1>newsless.cc</h1>
  <p><small>No ads, no tracking. | Simple news, move on.</small></p>

  <div id="section-title"></div>

  <ul id="nav-links">
    <li><a href="?loc=US">TOP</a></li>
    <li><a href="?section=technology&loc=US">TECH</a></li>
    <li><a href="?section=world&loc=US">WORLD</a></li>
    <li><a href="?section=business&loc=US">BUSINESS</a></li>
  </ul>

  <select id="locSelect"></select>

  <ol id="news-list"></ol>
</main>

<footer role="contentinfo">
  <small>Build by <a href="https://github.com/amadv" target="_blank"><b>amadv</b></a></small>
  <small>Maintained with ♥ for the web.</small>
</footer>

<script>
  const countries = {
    US: "🇺🇸 US", GB: "🇬🇧 UK", CA: "🇨🇦 Canada", AU: "🇦🇺 Australia",
    IN: "🇮🇳 India", DE: "🇩🇪 Germany", FR: "🇫🇷 France", JP: "🇯🇵 Japan",
    BR: "🇧🇷 Brazil", ZA: "🇿🇦 South Africa",
  };

  const params = new URLSearchParams(location.search);
  const section = params.get("section") || "";
  const loc = (params.get("loc") || "US").toUpperCase();
  const lang = params.get("lang") || "en";

  if (section) {
    document.getElementById("section-title").innerHTML =
      `<h2>${section.toUpperCase()} NEWS</h2>`;
  }

  const select = document.getElementById("locSelect");
  Object.entries(countries).forEach(([code, label]) => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = label;
    if (code === loc) opt.selected = true;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => {
    const newUrl = new URL(location.href);
    newUrl.searchParams.set("loc", select.value);
    if (section) newUrl.searchParams.set("section", section);
    location.href = newUrl;
  });

  let feedUrl = section
    ? `https://news.google.com/news/rss/headlines/section/topic/${section.toUpperCase()}?ned=${loc}&hl=${lang}`
    : `https://news.google.com/rss?gl=${loc}&hl=${lang}-${loc}&ceid=${loc}:${lang}`;

  const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;

  async function loadFeed() {
    const list = document.getElementById("news-list");
    list.innerHTML = "<li>Loading...</li>";

    try {
      const res = await fetch(apiUrl);
      const data = await res.json();

      if (!data.items || !data.items.length) {
        list.innerHTML = "<li>No news found.</li>";
        return;
      }

      list.innerHTML = "";
      data.items.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `
          <a href="${item.link}" target="_blank">${item.title}</a>
          <p><small>${new Date(item.pubDate).toLocaleDateString(undefined, {
            day: 'numeric', month: 'long', year: 'numeric'
          })} | ${new Date(item.pubDate).toLocaleTimeString(undefined, {
            hour: 'numeric', minute: '2-digit'
          })}</small></p>
        `;
        list.appendChild(li);
      });
    } catch (e) {
      list.innerHTML = `<li>Failed to load feed: ${e}</li>`;
    }
  }

  loadFeed();
</script>
</body>
</html>
